<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"; rel="stylesheet">
</head>
<body>
      <h1>JavaScript Conditional Statements</h1>

      <input type="text" class="form-control" id="number of years" placeholder="Enter your number of years of existence.">
      <button class="btn btn-info" onclick="checkAge()">Check Age</button>

      <script>
        function checkAge() {
            var age = document.getElementById("number of years").value
            
            if(age < 18) {
                alert("You are a minor, be careful!");
            }
            else if(age > 18){
                alert("You are a major, do NOT do something to minors!")
            }
            else{
                alert("You're biological specimen makes the detector unable to determine you age, please give up.")
            }
            

        }
      </script>
</body>
</html>
